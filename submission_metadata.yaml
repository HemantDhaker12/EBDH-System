ai_usage_summary: |
  Used Gemini and Claude for codebase modularization, feature audit checks, chronological consistency algorithms, and technical documentation. No candidate data was transmitted to external hosted API services during model execution.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Our pipeline implements a progressive filtering and ranking funnel (Three-Stage Sieve). First, a high-recall lexical BM25 search filters the 100k pool to 10k candidates. Second, dense semantic matching (using all-MiniLM-L6-v2 embeddings) ranks the subset, with lexical and dense rankings fused via Reciprocal Rank Fusion (RRF). Finally, 39 structured features (covering company ratios, stability, achievements, AI/ML domain relevance, and notice periods) are generated. The top candidates are scored using a trained LightGBM LambdaMART ranker and calibrated using a monotonic tie-breaker to prevent rank bucketization. Low credibility warnings (honeypots) drop candidate scores to 0.01 directly.

